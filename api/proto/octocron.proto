syntax = "proto3";

package octocron;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/NillHellberg/octocron/api/gen/octocron";

service Octocron {
  rpc CreateJob(CreateJobRequest) returns (Job);
  rpc GetJob(GetJobRequest) returns (Job);
  rpc ListJobs(ListJobsRequest) returns (ListJobsResponse);
  rpc DeleteJob(DeleteJobRequest) returns (google.protobuf.Empty);
  rpc GetJobHistory(GetJobHistoryRequest) returns (ListJobHistoryResponse);
}

message Job {
  string id = 1;
  string name = 2;
  string cron_expression = 3;
  string command = 4;
  repeated string targets = 5;
  bool enabled = 6;
  google.protobuf.Timestamp created_at = 7;
}

message CreateJobRequest {
  string name = 1;
  string cron_expression = 2;
  string command = 3;
  repeated string targets = 4;
}

message GetJobRequest {
  string id = 1;
}

message ListJobsRequest {}

message ListJobsResponse {
  repeated Job jobs = 1;
}

message DeleteJobRequest {
  string id = 1;
}

message JobExecution {
  string job_id = 1;
  google.protobuf.Timestamp start_time = 2;
  google.protobuf.Timestamp end_time = 3;
  int32 exit_code = 4;
  string output = 5;
  string error = 6;
}

message GetJobHistoryRequest {
  string job_id = 1;
  int32 limit = 2;
}

message ListJobHistoryResponse {
  repeated JobExecution history = 1;
}
